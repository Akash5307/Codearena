# Serves the built SPA and reverse-proxies /api to the backend container.
# This keeps the browser same-origin, so the backend's lack of CORS config
# does not matter (mirrors the Vite dev proxy used in development).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Spring Boot API container.
    # Using Docker's embedded DNS (127.0.0.11) + a variable upstream defers name
    # resolution to request time, so nginx still boots if the API container is
    # not up yet (returns 502 until it is, instead of failing to start).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream codearena-api:8080;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
