spring:
  application:
    name: codearena-judge

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 2
        max-concurrency: 4
        prefetch: 1

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:codearena-testcases}

judge:
  # Sandbox scratch space. MUST be a path shared host<->container at the same
  # absolute location when the judge runs in Docker (DooD bind-mount semantics).
  # Empty = system temp dir, for running the judge directly on the host.
  work-dir: ${JUDGE_WORK_DIR:}

server:
  port: 8081
